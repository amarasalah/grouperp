    .stat .num { font-size: 1.5rem; font-weight: 700; color: #4f46e5; }
    .stat .label { font-size: 0.82rem; color: #94a3b8; }

    button:hover:not(:disabled) { background: #4338ca; }
    .warn { color: #f59e0b; }
    .ok { color: #22c55e; }
    .err { color: #ef4444; }

<body>

  <div class="stats">
    <div class="stat"><div class="num" id="total-count">440</div><div class="label">Total Supports</div></div>
    <div class="stat"><div class="num" id="existing-count">-</div><div class="label">Déjà Existants</div></div>
    <div class="stat"><div class="num" id="new-count">-</div><div class="label">À Importer</div></div>
    <div class="stat"><div class="num" id="done-count">0</div><div class="label">Importés</div></div>
  </div>
  
  <button id="check-btn" onclick="checkData()">1. Vérifier les données</button>
  <button id="import-btn" onclick="startImport()" disabled>2. Lancer l'import</button>
  
  <div id="log" style="margin-top:16px"></div>
</div>

<script type="module">

const LOT_NUMERO = "4D0305495";
const CAT_PREFIX = "BAP 9/300";

let lotData = null;
let catData = null;
let existingRefs = new Set();
let toImport = [];

function log(msg, cls = '') {
  const el = document.getElementById('log');
  const span = cls ? `<span class="${cls}">${msg}</span>` : msg;
  el.innerHTML += span + '\n';
  el.scrollTop = el.scrollHeight;
}

window.checkData = async function() {
  const btn = document.getElementById('check-btn');
  btn.disabled = true;
  btn.textContent = 'Vérification...';
  document.getElementById('log').innerHTML = '';
  
  try {
    // 1. Find the lot
    log('🔍 Recherche du lot ' + LOT_NUMERO + '...');
    const lotsSnap = await getDocs(collection(db, 'lots'));
    const lots = lotsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    lotData = lots.find(l => l.numero && l.numero.includes('4D0305495'));
    if (!lotData) {
      // Try partial match
      lotData = lots.find(l => l.numero && (l.numero.includes('4D03') || l.numero.includes('0305495')));
    }
    if (!lotData) {
      log('❌ Lot non trouvé! Lots existants:', 'err');
      lots.forEach(l => log('   - ' + l.numero));
      return;
    }
    log('✅ Lot trouvé: ' + lotData.numero + ' (ID: ' + lotData.id + ')', 'ok');

    // 2. Find the category
    log('🔍 Recherche de la catégorie POTEAU ELECTRIQUE EN BETON PRECONTRAINT 300...');
    const catsSnap = await getDocs(collection(db, 'categories'));
    const cats = catsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    catData = cats.find(c => c.nom && c.nom.toUpperCase().includes('PRECONTRAINT') && c.nom.includes('300'));
    if (!catData) {
      catData = cats.find(c => c.nom && c.nom.toUpperCase().includes('300'));
    }
    if (!catData) {
      catData = cats.find(c => c.nom && (c.nom.toUpperCase().includes('BAP') || c.nom.toUpperCase().includes('POTEAU')));
    }
    if (!catData) {
      log('❌ Catégorie non trouvée! Catégories existantes:', 'err');
      cats.forEach(c => log('   - ' + c.nom));
      return;
    }
    log('✅ Catégorie trouvée: ' + catData.nom + ' (ID: ' + catData.id + ')', 'ok');

    // 3. Get prices from lot
    const catPrix = (lotData.prixParCategorie || []).find(p => p.categorieId === catData.id);
    if (catPrix) {
      log('💰 Prix Achat: ' + (catPrix.prixAchat || 0) + ' DT | Prix Vente: ' + (catPrix.prixVente || 0) + ' DT', 'ok');
    } else {
      log('⚠️ Pas de prix définis pour cette catégorie dans ce lot', 'warn');
    }

    // 4. Check existing products
    log('🔍 Vérification des produits existants...');
    const prodsSnap = await getDocs(collection(db, 'produits'));
    const prods = prodsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    existingRefs = new Set(prods.map(p => p.reference));
    
    // 5. Determine what to import
    toImport = PRODUCT_NUMBERS.filter(n => !existingRefs.has(String(n)));
    const existing = PRODUCT_NUMBERS.length - toImport.length;
    
    document.getElementById('existing-count').textContent = existing;
    document.getElementById('new-count').textContent = toImport.length;
    
    if (existing > 0) {
      log('⚠️ ' + existing + ' produits existent déjà et seront ignorés', 'warn');
    }
    log('📦 ' + toImport.length + ' nouveaux produits à importer', 'ok');
    
    if (toImport.length > 0) {
      document.getElementById('import-btn').disabled = false;
    }
    
    log('\n✅ Vérification terminée. Cliquez sur "Lancer l\'import" pour continuer.');
    
  } catch (err) {
    log('❌ Erreur: ' + err.message, 'err');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '1. Vérifier les données';
  }
};

window.startImport = async function() {
  if (!lotData || !catData || toImport.length === 0) return;
  
  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'Import en cours...';
  
  const catPrix = (lotData.prixParCategorie || []).find(p => p.categorieId === catData.id);
  const prixAchat = catPrix?.prixAchat || 0;
  const prixVente = catPrix?.prixVente || 0;
  
  let done = 0;
  let errors = 0;
  const BATCH_SIZE = 10;
  
  log('\n🚀 Début de l\'import de ' + toImport.length + ' produits...');
  
  for (let i = 0; i < toImport.length; i += BATCH_SIZE) {
    const batch = toImport.slice(i, i + BATCH_SIZE);
    const promises = batch.map(async (num) => {
      const ref = String(num);
      try {
        await addDoc(collection(db, 'produits'), {
          reference: ref,
          designation: catData.nom + ' N\u00B0' + ref,
          categorieId: catData.id,
          categorieNom: catData.nom,
          fournisseurId: '',
          fournisseurNom: '',
          lotId: lotData.id,
          lotNumero: lotData.numero,
          prixAchat,
          prixVente,
          unite: 'Unité',
          stock: 0,
          numero: num,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        done++;
        return true;
      } catch (err) {
        errors++;
        log('  ❌ Erreur pour N°' + ref + ': ' + err.message, 'err');
        return false;
      }
    });
    
    await Promise.all(promises);
    document.getElementById('done-count').textContent = done;
    
    if ((i + BATCH_SIZE) % 50 === 0 || i + BATCH_SIZE >= toImport.length) {
      log('  📊 Progression: ' + done + '/' + toImport.length + (errors > 0 ? ' (' + errors + ' erreurs)' : ''));
    }
  }
  
  log('\n' + '='.repeat(50));
  log('✅ IMPORT TERMINÉ', 'ok');
  log('   Importés: ' + done, 'ok');
  if (errors > 0) log('   Erreurs: ' + errors, 'err');
  log('   Lot: ' + lotData.numero);
  log('   Catégorie: ' + catData.nom);
  
  btn.textContent = '✅ Import terminé!';
};
</script>
