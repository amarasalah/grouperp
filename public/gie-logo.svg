<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <!-- Circle left half red -->
  <clipPath id="left-half"><rect x="0" y="0" width="90" height="180"/></clipPath>
  <clipPath id="right-half"><rect x="90" y="0" width="90" height="180"/></clipPath>
  <circle cx="90" cy="90" r="85" fill="#C0242A" clip-path="url(#left-half)"/>
  <circle cx="90" cy="90" r="85" fill="#1A3A6E" clip-path="url(#right-half)"/>
  <!-- ECG / heartbeat line -->
  <polyline points="15,90 40,90 52,60 62,120 72,50 85,130 95,75 105,90 130,90 150,90 165,90" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- G.I.E text -->
  <text x="195" y="90" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="#1A3A6E" letter-spacing="4">G.I.E</text>
  <!-- Decorative line with + -->
  <line x1="195" y1="108" x2="510" y2="108" stroke="#5BB3D8" stroke-width="3"/>
  <text x="195" y="104" font-family="Arial" font-size="14" fill="#5BB3D8">+</text>
  <text x="295" y="104" font-family="Arial" font-size="14" fill="#5BB3D8">+</text>
  <text x="395" y="104" font-family="Arial" font-size="14" fill="#5BB3D8">+</text>
  <text x="505" y="104" font-family="Arial" font-size="14" fill="#5BB3D8">+</text>
  <!-- SIREP PREFA & SIREP BETON -->
  <text x="195" y="145" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#C0242A" letter-spacing="1">SIREP PREFA &amp; SIREP BETON</text>
</svg>
