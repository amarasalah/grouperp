    window.verify = async function() {
      const logEl = document.getElementById('log');
      logEl.innerHTML = '';
      
      log('🔍 Recherche du lot AD0305495...', 'info');
      
      // Find lot
      const lotsSnap = await getDocs(collection(db, 'lots'));
      log('📋 Lots disponibles:', 'info');
      lotsSnap.forEach(doc => {
        const data = doc.data();
        log('  - "' + data.numero + '" (ID: ' + doc.id + ')', 'info');
        // Try multiple matching approaches
        const num = (data.numero || '').toString().trim();
        if (num === 'AD0305495' || num.includes('AD0305495') || num === 'No AD0305495' || num === 'N° AD0305495') {
          lotData = { id: doc.id, ...data };
        }
      });
      
      if (!lotData) {
        log('❌ Lot AD0305495 non trouvé!', 'error');
        return;
      }
      log('✅ Lot trouvé: ' + lotData.numero + ' (ID: ' + lotData.id + ')', 'success');
      
      // Find category (BAP 9/150 = PRECONTRAINT 150)
      log('\n🔍 Recherche de la catégorie PRECONTRAINT 150...', 'info');
      const catsSnap = await getDocs(collection(db, 'categories'));
      catsSnap.forEach(doc => {
        const data = doc.data();
        const nom = (data.nom || '').toUpperCase();
        if (nom.includes('PRECONTRAINT') && nom.includes('150')) {
          catData = { id: doc.id, ...data };
        }
      });
      
      if (!catData) {
        log('❌ Catégorie PRECONTRAINT 150 non trouvée!', 'error');
        log('Catégories disponibles:', 'warn');
        catsSnap.forEach(doc => {
          log('  - ' + doc.data().nom, 'warn');
        });
        return;
      }
      log('✅ Catégorie trouvée: ' + catData.nom + ' (ID: ' + catData.id + ')', 'success');
      
      // Check existing products
      log('\n🔍 Vérification des produits existants...', 'info');
      const prodsSnap = await getDocs(collection(db, 'produits'));
      prodsSnap.forEach(doc => {
        const data = doc.data();
        if (data.lotId === lotData.id && data.categorieId === catData.id) {
          existingRefs.add(String(data.reference));
        }
      });
      log('📦 Produits existants dans ce lot/catégorie: ' + existingRefs.size, 'info');
      
      // Determine what to import
      toImport = PRODUCT_NUMBERS.filter(n => !existingRefs.has(String(n)));
      
      log('\n📊 Résumé:', 'info');
      log('  - Total dans PDF: ' + PRODUCT_NUMBERS.length, 'info');
      log('  - Déjà existants: ' + (PRODUCT_NUMBERS.length - toImport.length), 'info');
      log('  - À importer: ' + toImport.length, 'success');
      
      if (toImport.length > 0) {
        document.getElementById('btnImport').disabled = false;
        log('\n✅ Prêt pour l\'import! Cliquez sur "Lancer l\'import"', 'success');
      } else {
        log('\n⚠️ Aucun produit à importer (tous existent déjà)', 'warn');
      }
    };

    window.runImport = async function() {
      if (!lotData || !catData || toImport.length === 0) {
        log('❌ Veuillez d\'abord vérifier les données', 'error');
        return;
      }
      
      document.getElementById('btnImport').disabled = true;
      
      const prixAchat = lotData.prixAchat || 0;
      const prixVente = lotData.prixVente || 0;
      
      log('\n🚀 Début de l\'import de ' + toImport.length + ' produits...', 'info');
      log('Prix Achat: ' + prixAchat + ' | Prix Vente: ' + prixVente, 'info');
      
      const BATCH_SIZE = 20;
      let imported = 0;
      let errors = 0;
      
      for (let i = 0; i < toImport.length; i += BATCH_SIZE) {
        const batch = toImport.slice(i, i + BATCH_SIZE);
        const promises = batch.map(async (num) => {
          const ref = String(num);
          try {
            await addDoc(collection(db, 'produits'), {
              reference: ref,
              designation: catData.nom + ' N°' + ref,
              categorieId: catData.id,
              categorieNom: catData.nom,
              fournisseurId: '',
              fournisseurNom: '',
              lotId: lotData.id,
              lotNumero: lotData.numero,
              prixAchat,
              prixVente,
              unite: 'Unité',
              stock: 0,
              createdAt: new Date().toISOString()
            });
            imported++;
            return true;
          } catch (e) {
            errors++;
            log('❌ Erreur pour ' + ref + ': ' + e.message, 'error');
            return false;
          }
        });
        
        await Promise.all(promises);
        log('📦 Progression: ' + Math.min(i + BATCH_SIZE, toImport.length) + '/' + toImport.length, 'info');
      }
      
      log('\n✅ Import terminé!', 'success');
      log('  - Importés: ' + imported, 'success');
      if (errors > 0) log('  - Erreurs: ' + errors, 'error');
    };
